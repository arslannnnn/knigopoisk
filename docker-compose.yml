services:
  web:
    build: .
    command: gunicorn knigopoisk_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - appnet

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: knigopoisk
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    depends_on:
      - web
    links:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles
    networks:
      - appnet

volumes:
  postgres_data:
  staticfiles:

networks:
  appnet:
    driver: bridge
