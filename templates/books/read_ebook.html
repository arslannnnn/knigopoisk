{% extends 'base.html' %}

{% block title %}Читать {{ book.title }} - KnigoPoisk{% endblock %}

{% block content %}
<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'home' %}">Главная</a></li>
            <li class="breadcrumb-item"><a href="{% url 'book_list' %}">Каталог</a></li>
            <li class="breadcrumb-item"><a href="{% url 'book_detail' book.id %}">{{ book.title|truncatechars:30 }}</a></li>
            <li class="breadcrumb-item active">Чтение</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
                        <div>
                            <h1 class="h2 mb-1">{{ book.title }}</h1>
                            <p class="text-muted mb-0">{{ book.author.name }}</p>
                        </div>
                        <a href="{% url 'book_detail' book.id %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> К книге
                        </a>
                    </div>
                    <article class="ebook-reader">
                        {{ ebook_text|linebreaksbr }}
                    </article>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .ebook-reader {
        color: #212529;
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 1.15rem;
        line-height: 1.85;
    }
</style>
{% endblock %}
